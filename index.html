<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria - Registro de Mascotas</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            background: #ffffff;
            margin: 20px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h1, h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
        }
        fieldset {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #f8fafc;
        }
        legend {
            font-weight: bold;
            color: #2563eb;
            padding: 0 10px;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
        }
        input, select, textarea {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            background-color: #fff;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .row .form-group {
            flex: 1;
            min-width: 200px;
        }
        button {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #059669;
        }
        .message {
            padding: 15px;
            margin-top: 15px;
            margin-bottom: 25px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        
        /* Estilos de la Sección de Listado Obligatorio */
        .listado-section {
            margin-top: 40px;
            border-top: 2px dashed #cbd5e1;
            padding-top: 30px;
        }
        .filtro-box {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .filtro-box label { margin: 0; font-size: 15px; }
        .filtro-box select { width: auto; min-width: 200px; }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #1e3a8a;
            color: white;
            font-weight: 600;
        }
        tr:hover { background-color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Veterinaria: Registro y Control de Mascotas</h1>
    
    <div id="mensajeAlerta" class="message"></div>

    <form id="mascotaForm">
        <fieldset>
            <legend>Datos de la Mascota</legend>
            <div class="row">
                <div class="form-group">
                    <label for="nombre_mascota">Nombre de la Mascota *</label>
                    <input type="text" id="nombre_mascota">
                </div>
                <div class="form-group">
                    <label for="edad_mascota">Edad (Años)</label>
                    <input type="number" id="edad_mascota" min="0">
                </div>
                <div class="form-group">
                    <label for="peso">Peso (kg)</label>
                    <input type="number" id="peso" step="0.01" min="0">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="especie_id">Especie *</label>
                    <select id="especie_id">
                        <option value="">Cargando especies...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="raza_id">Raza *</label>
                    <select id="raza_id">
                        <option value="">Cargando razas...</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Datos del Dueño (Estudiante)</legend>
            <div class="row">
                <div class="form-group">
                    <label for="nombre_dueno">Nombres del Dueño *</label>
                    <input type="text" id="nombre_dueno">
                </div>
                <div class="form-group">
                    <label for="apellido_dueno">Apellidos del Dueño *</label>
                    <input type="text" id="apellido_dueno">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="dni_dueno">DNI del Dueño (8 dígitos) *</label>
                    <input type="text" id="dni_dueno" maxlength="8">
                </div>
                <div class="form-group">
                    <label for="celular">Celular (mín. 9 dígitos) *</label>
                    <input type="text" id="celular" maxlength="15">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico *</label>
                    <input type="email" id="correo">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Detalles de la Atención Médica</legend>
            <div class="row">
                <div class="form-group">
                    <label for="tipo_atencion_id">Tipo de Atención *</label>
                    <select id="tipo_atencion_id">
                        <option value="">Cargando tipos...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="condicion_medica_id">Condición Médica *</label>
                    <select id="condicion_medica_id">
                        <option value="">Cargando condiciones...</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="observaciones">Observaciones adicionales</label>
                <textarea id="observaciones" rows="3" placeholder="Síntomas, alergias detectadas o historial previo..."></textarea>
            </div>
        </fieldset>

        <button type="submit">Registrar Mascota</button>
    </form>

    <div class="listado-section">
        <h2>Mascotas Registradas</h2>
        
        <div class="filtro-box">
            <label for="filtroEspecie"><strong>Filtrar por Especie:</strong></label>
            <select id="filtroEspecie">
                <option value="TODOS">Mostrar todos</option>
            </select>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mascota</th>
                        <th>Edad</th>
                        <th>Peso</th>
                        <th>Dueño</th>
                        <th>DNI Dueño</th>
                        <th>Celular</th>
                        <th>Especie</th>
                        <th>Raza</th>
                        <th>Atención</th>
                        <th>Condición Médica</th>
                    </tr>
                </thead>
                <tbody id="tablaMascotasBody">
                    <tr>
                        <td colspan="10" style="text-align: center; color: #64748b;">Cargando registros desde Supabase...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
